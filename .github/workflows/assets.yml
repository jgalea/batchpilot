name: Update wp.org readme and assets

on:
  push:
    branches:
      - main
    paths:
      - "readme.txt"
      - ".wordpress-org/**"
  workflow_dispatch:

jobs:
  assets:
    name: Sync readme and assets to wp.org
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update readme and assets
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: batchpilot
          # Sync only readme.txt + .wordpress-org assets. Without this the action
          # rsyncs the whole checkout into trunk and deletes trunk/vendor (composer
          # deps aren't committed here), which crashes on the vendor/composer revert.
          IGNORE_OTHER_FILES: "true"
