name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: PHPUnit (unit) — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - run: composer install --prefer-dist --no-progress
      - run: composer test:unit

  lint:
    name: PHPCS + PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - run: composer install --prefer-dist --no-progress
      - run: composer lint
      - run: composer stan

  integration:
    name: PHPUnit (integration) via wp-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - run: composer install --prefer-dist --no-progress
      - run: npm ci
      - run: npm run env:start
      - run: npm run env:test

  js:
    name: JS build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
